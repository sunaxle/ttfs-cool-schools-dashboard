<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Document Viewer - Rio Grande Schools</title>
  <link rel="stylesheet" href="style.css" />
  <!-- marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .viewer-container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #333;
    }
    .viewer-container h1, .viewer-container h2, .viewer-container h3 {
      color: #1b4d2b;
      border-bottom: 1px solid #eaecef;
      padding-bottom: 0.3em;
    }
    .viewer-container table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 20px;
    }
    .viewer-container th, .viewer-container td {
      border: 1px solid #dfe2e5;
      padding: 8px 12px;
    }
    .viewer-container th {
      background-color: #f6f8fa;
    }
    .viewer-container code {
      background-color: #f6f8fa;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-family: monospace;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 16px;
      background-color: #2e6b3f;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }
    .back-btn:hover {
      background-color: #1b4d2b;
    }
    #errorMsg {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="title">Document Viewer</div>
  </header>

  <main>
    <div class="viewer-container">
      <a href="milestones.html" class="back-btn">&larr; Back to Milestones</a>
      <div id="content">Loading document...</div>
      <div id="errorMsg"></div>
    </div>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const docPath = urlParams.get('doc');
    const contentDiv = document.getElementById('content');
    const errorMsg = document.getElementById('errorMsg');

    if (!docPath) {
      contentDiv.style.display = 'none';
      errorMsg.textContent = "No document specified in the URL.";
    } else {
      fetch(docPath)
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response.text();
        })
        .then(markdown => {
          contentDiv.innerHTML = marked.parse(markdown);
        })
        .catch(error => {
          contentDiv.style.display = 'none';
          errorMsg.textContent = `Error loading document: ${docPath}. (${error.message}). Note: Browsers may block local file fetching due to CORS. You may need to run a local web server.`;
        });
    }
  </script>
</body>
</html>
