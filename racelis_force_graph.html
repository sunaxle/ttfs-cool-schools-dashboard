<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Racelis Academic Force Graph</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-top: 30px;
            z-index: 10;
            pointer-events: none;
            position: absolute;
            top: 0;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        .header p {
            color: #94a3b8;
            font-weight: 300;
        }

        #chart-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        svg:active {
            cursor: grabbing;
        }

        .link {
            stroke: rgba(255, 255, 255, 0.2);
            stroke-opacity: 0.6;
        }

        .node circle {
            stroke: #fff;
            stroke-width: 1.5px;
            cursor: pointer;
            transition: stroke-width 0.2s, filter 0.2s;
        }

        .node circle:hover {
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.9));
            stroke-width: 3px;
        }

        .node text {
            font-size: 12px;
            fill: #cbd5e1;
            pointer-events: none;
        }

        #tooltip {
            position: absolute;
            opacity: 0;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 15px;
            pointer-events: none;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            color: white;
            transition: opacity 0.2s ease;
            max-width: 250px;
            z-index: 100;
        }
        
        #tooltip h4 { color: #818cf8; margin-bottom: 5px; font-size: 14px; }
        #tooltip p { font-size: 12px; color: #cbd5e1; font-weight: 300; line-height: 1.4; }
        #tooltip .group-badge {
            display: inline-block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.1);
        }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="racelis_network_data.js"></script>
</head>
<body>

    <div class="header">
        <h1>Dr. Racelis Academic Network</h1>
        <p>Interactive Force-Directed Graph mapping cohorts since 2013</p>
    </div>

    <div id="tooltip">
        <div class="group-badge" id="tt-group">GROUP</div>
        <h4 id="tt-name">Name</h4>
        <p id="tt-desc">Description goes here.</p>
    </div>

    <div id="chart-container"></div>

    <script>
        // Flatten the hierarchy to a set of nodes and links
        const root = d3.hierarchy(treeData);
        const nodes = root.descendants();
        const links = root.links();

        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#chart-container").append("svg")
            .attr("viewBox", [0, 0, width, height]);

        const group = svg.append("g");

        // Zoom and pan
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (e) => {
                group.attr("transform", e.transform);
            });
        svg.call(zoom);

        // Define colors
        const colorScale = {
            "root": "#c084fc",
            "leadership": "#f59e0b",
            "masters": "#3b82f6",
            "undergrad": "#10b981"
        };

        const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(80))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2 + 50))
            .force("collide", d3.forceCollide().radius(25));

        const link = group.append("g")
            .attr("class", "link")
            .selectAll("line")
            .data(links)
            .join("line")
            .attr("stroke-width", d => Math.sqrt(d.source.depth === 0 ? 4 : 2));

        const node = group.append("g")
            .attr("class", "node")
            .selectAll("g")
            .data(nodes)
            .join("g")
            .call(drag(simulation));

        node.append("circle")
            .attr("r", d => d.depth === 0 ? 16 : (d.depth === 1 ? 12 : 8))
            .attr("fill", d => colorScale[d.data.group])
            .on("mouseover", function(event, d) {
                const tooltip = d3.select("#tooltip");
                tooltip.style("opacity", 1);
                
                document.getElementById('tt-name').innerText = d.data.name;
                document.getElementById('tt-desc').innerText = d.data.description || 'No description available.';
                document.getElementById('tt-group').innerText = (d.data.group || 'Node').toUpperCase();
                
                let bgColors = {
                    "leadership": "rgba(245, 158, 11, 0.2)",
                    "masters": "rgba(59, 130, 246, 0.2)",
                    "undergrad": "rgba(16, 185, 129, 0.2)",
                    "root": "rgba(192, 132, 252, 0.2)"
                };
                document.getElementById('tt-group').style.background = bgColors[d.data.group] || "rgba(255,255,255,0.1)";
            })
            .on("mousemove", function(event) {
                d3.select("#tooltip")
                    .style("left", (event.pageX + 15) + "px")
                    .style("top", (event.pageY - 15) + "px");
            })
            .on("mouseout", function() {
                d3.select("#tooltip").style("opacity", 0);
            });

        node.append("text")
            .attr("x", 12)
            .attr("y", "0.31em")
            .text(d => d.data.name)
            .clone(true).lower()
            .attr("fill", "none")
            .attr("stroke", "rgba(15,23,42,0.8)")
            .attr("stroke-width", 3);

        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("transform", d => `translate(${d.x},${d.y})`);
        });

        // Drag functionality
        function drag(simulation) {
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }
            
            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }
    </script>
</body>
</html>
